<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>

    <!-- Link to our external stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- ── Main calculator card ── -->
    <div class="calculator">

      <!-- Display screen -->
      <div class="display">
        <!-- Small line showing the expression being typed (e.g. "12 + 3") -->
        <div class="expression" id="expression"></div>
        <!-- Large line showing the current number or final result -->
        <div class="result" id="result">0</div>
      </div>

      <!-- Button grid (laid out with CSS Grid in style.css) -->
      <div class="buttons">

        <!-- Row 1 -->
        <button class="btn btn-clear"    id="clear">C</button>
        <button class="btn btn-action"   id="delete">⌫</button>
        <button class="btn btn-action"   id="percent">%</button>
        <button class="btn btn-operator" data-op="/">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-number" data-num="7">7</button>
        <button class="btn btn-number" data-num="8">8</button>
        <button class="btn btn-number" data-num="9">9</button>
        <button class="btn btn-operator" data-op="*">×</button>

        <!-- Row 3 -->
        <button class="btn btn-number" data-num="4">4</button>
        <button class="btn btn-number" data-num="5">5</button>
        <button class="btn btn-number" data-num="6">6</button>
        <button class="btn btn-operator" data-op="-">−</button>

        <!-- Row 4 -->
        <button class="btn btn-number" data-num="1">1</button>
        <button class="btn btn-number" data-num="2">2</button>
        <button class="btn btn-number" data-num="3">3</button>
        <button class="btn btn-operator" data-op="+">+</button>

        <!-- Row 5 — 0 spans two columns via CSS class -->
        <button class="btn btn-number btn-zero" data-num="0">0</button>
        <button class="btn btn-number" data-num=".">.</button>
        <button class="btn btn-equals" id="equals">=</button>

      </div>
    </div>

    <!-- Link to our external JavaScript file (placed at the bottom so the
         HTML elements exist before the script tries to find them) -->
    <script src="script.js"></script>
  </body>
</html>
